<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Parabens and toxins — what to actually avoid in skincare ingredient labels">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FAF8F2"/>
      <stop offset="1" stop-color="#EFEAE0"/>
    </linearGradient>
    <pattern id="paper9" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r=".6" fill="#2F3269" fill-opacity=".05"/>
    </pattern>
    <linearGradient id="lens9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFF4C1" stop-opacity=".3"/>
      <stop offset="1" stop-color="#E7C27E" stop-opacity=".15"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="900" fill="url(#bg9)"/>
  <rect width="1600" height="900" fill="url(#paper9)"/>

  <!-- Stylized ingredient label rectangle -->
  <g transform="translate(280 140)">
    <rect width="800" height="620" rx="14" fill="#FFFFFF" stroke="#2F3269" stroke-opacity=".3" stroke-width="2"/>
    <!-- Label header -->
    <rect width="800" height="60" rx="14" fill="#2F3269"/>
    <rect y="46" width="800" height="14" fill="#2F3269"/>
    <text x="40" y="40" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFF4C1" letter-spacing="3">INGREDIENTS · INCI</text>

    <!-- Ingredient lines (alternating "safe" and "avoid") -->
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">
      <!-- Safe -->
      <g transform="translate(40 110)">
        <circle cx="-2" cy="-5" r="9" fill="#dce8e0" stroke="#3a5d52" stroke-width="2"/>
        <path d="M -6 -5 L -3 -2 L 3 -8" stroke="#3a5d52" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" fill="#2F3269">Aqua · Aloe Barbadensis · Niacinamide</text>
      </g>
      <!-- Avoid -->
      <g transform="translate(40 160)">
        <circle cx="-2" cy="-5" r="9" fill="#f5dadf" stroke="#9f4f63" stroke-width="2"/>
        <path d="M -6 -9 L 2 -1 M 2 -9 L -6 -1" stroke="#9f4f63" stroke-width="2.5" stroke-linecap="round"/>
        <text x="20" y="0" fill="#9f4f63" text-decoration="line-through">Methylparaben · Propylparaben</text>
      </g>
      <g transform="translate(40 210)">
        <circle cx="-2" cy="-5" r="9" fill="#dce8e0" stroke="#3a5d52" stroke-width="2"/>
        <path d="M -6 -5 L -3 -2 L 3 -8" stroke="#3a5d52" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" fill="#2F3269">Glycerin · Tocopherol · Squalane</text>
      </g>
      <g transform="translate(40 260)">
        <circle cx="-2" cy="-5" r="9" fill="#f5dadf" stroke="#9f4f63" stroke-width="2"/>
        <path d="M -6 -9 L 2 -1 M 2 -9 L -6 -1" stroke="#9f4f63" stroke-width="2.5" stroke-linecap="round"/>
        <text x="20" y="0" fill="#9f4f63" text-decoration="line-through">Sodium Lauryl Sulfate (SLS)</text>
      </g>
      <g transform="translate(40 310)">
        <circle cx="-2" cy="-5" r="9" fill="#dce8e0" stroke="#3a5d52" stroke-width="2"/>
        <path d="M -6 -5 L -3 -2 L 3 -8" stroke="#3a5d52" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" fill="#2F3269">Hyaluronic Acid · Centella Asiatica</text>
      </g>
      <g transform="translate(40 360)">
        <circle cx="-2" cy="-5" r="9" fill="#f5dadf" stroke="#9f4f63" stroke-width="2"/>
        <path d="M -6 -9 L 2 -1 M 2 -9 L -6 -1" stroke="#9f4f63" stroke-width="2.5" stroke-linecap="round"/>
        <text x="20" y="0" fill="#9f4f63" text-decoration="line-through">Formaldehyde Releasers · DMDM Hydantoin</text>
      </g>
      <g transform="translate(40 410)">
        <circle cx="-2" cy="-5" r="9" fill="#dce8e0" stroke="#3a5d52" stroke-width="2"/>
        <path d="M -6 -5 L -3 -2 L 3 -8" stroke="#3a5d52" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" fill="#2F3269">Ceramide NP · Panthenol · Allantoin</text>
      </g>
      <g transform="translate(40 460)">
        <circle cx="-2" cy="-5" r="9" fill="#f5dadf" stroke="#9f4f63" stroke-width="2"/>
        <path d="M -6 -9 L 2 -1 M 2 -9 L -6 -1" stroke="#9f4f63" stroke-width="2.5" stroke-linecap="round"/>
        <text x="20" y="0" fill="#9f4f63" text-decoration="line-through">Synthetic Fragrance · Phthalates</text>
      </g>
      <g transform="translate(40 510)">
        <circle cx="-2" cy="-5" r="9" fill="#dce8e0" stroke="#3a5d52" stroke-width="2"/>
        <path d="M -6 -5 L -3 -2 L 3 -8" stroke="#3a5d52" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="20" y="0" fill="#2F3269">Tea Tree · Salicylic Acid · Zinc PCA</text>
      </g>
      <g transform="translate(40 560)">
        <circle cx="-2" cy="-5" r="9" fill="#f5dadf" stroke="#9f4f63" stroke-width="2"/>
        <path d="M -6 -9 L 2 -1 M 2 -9 L -6 -1" stroke="#9f4f63" stroke-width="2.5" stroke-linecap="round"/>
        <text x="20" y="0" fill="#9f4f63" text-decoration="line-through">Oxybenzone · Octinoxate</text>
      </g>
    </g>
  </g>

  <!-- Magnifying glass over the bottom-right of the label -->
  <g transform="translate(1180 540)">
    <circle r="170" fill="url(#lens9)" stroke="#2F3269" stroke-width="6"/>
    <circle r="170" fill="none" stroke="#FFF4C1" stroke-width="2" stroke-opacity=".7"/>
    <!-- Inner reflection -->
    <ellipse cx="-50" cy="-60" rx="30" ry="14" fill="#FFFFFF" fill-opacity=".5"/>
    <!-- Handle -->
    <line x1="120" y1="120" x2="240" y2="240" stroke="#2F3269" stroke-width="22" stroke-linecap="round"/>
    <line x1="120" y1="120" x2="240" y2="240" stroke="#52357D" stroke-width="14" stroke-linecap="round"/>
  </g>

  <text x="800" y="845" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2F3269" letter-spacing="3" fill-opacity=".75">READ THE LABEL · KNOW WHAT MATTERS</text>
</svg>
