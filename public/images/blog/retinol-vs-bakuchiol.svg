<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Retinol vs bakuchiol — clinical molecule comparison">
  <defs>
    <linearGradient id="bgL5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ECECF5"/>
      <stop offset="1" stop-color="#F2F2FA"/>
    </linearGradient>
    <linearGradient id="bgR5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FAF8F2"/>
      <stop offset="1" stop-color="#EFEAE0"/>
    </linearGradient>
    <radialGradient id="halo6" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#FFF4C1" stop-opacity=".7"/>
      <stop offset="1" stop-color="#E7C27E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Two-tone background, vertical split -->
  <rect width="800" height="900" fill="url(#bgL5)"/>
  <rect x="800" width="800" height="900" fill="url(#bgR5)"/>

  <!-- Center divider hairline -->
  <line x1="800" y1="80" x2="800" y2="820" stroke="#2F3269" stroke-opacity=".25" stroke-width="1.5" stroke-dasharray="6 8"/>

  <!-- Left: RETINOL — synthetic molecule (hexagonal ring chain) -->
  <g transform="translate(400 450)">
    <circle cx="0" cy="0" r="240" fill="url(#halo6)"/>

    <!-- Retinol carbon-ring chain (stylized): a benzene-style ring + a long polyene tail -->
    <g stroke="#2F3269" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Ring -->
      <polygon points="-120,-30 -85,-90 -15,-90 20,-30 -15,30 -85,30" fill="#FFF4C1" fill-opacity=".5"/>
      <!-- Polyene tail (zigzag with double-bond marks) -->
      <path d="M 20 -30 L 60 -55 L 100 -30 L 140 -55 L 180 -30 L 220 -55"/>
      <line x1="60" y1="-55" x2="60" y2="-70" stroke-width="2.5"/>
      <line x1="140" y1="-55" x2="140" y2="-70" stroke-width="2.5"/>
      <line x1="220" y1="-55" x2="220" y2="-70" stroke-width="2.5"/>
      <!-- OH group -->
      <text x="240" y="-50" font-family="ui-sans-serif, system-ui, sans-serif" font-size="22" font-weight="700" fill="#2F3269">OH</text>
      <!-- Ring methyls -->
      <line x1="-85" y1="-90" x2="-85" y2="-115"/>
      <line x1="-15" y1="-90" x2="-15" y2="-115"/>
      <line x1="-120" y1="-30" x2="-145" y2="-30"/>
    </g>

    <!-- Atom dots -->
    <g fill="#442F69">
      <circle cx="-120" cy="-30" r="4"/>
      <circle cx="-85" cy="-90" r="4"/>
      <circle cx="-15" cy="-90" r="4"/>
      <circle cx="20" cy="-30" r="4"/>
      <circle cx="-15" cy="30" r="4"/>
      <circle cx="-85" cy="30" r="4"/>
      <circle cx="60" cy="-55" r="4"/>
      <circle cx="100" cy="-30" r="4"/>
      <circle cx="140" cy="-55" r="4"/>
      <circle cx="180" cy="-30" r="4"/>
      <circle cx="220" cy="-55" r="4"/>
    </g>
  </g>

  <!-- Right: BAKUCHIOL — botanical leaf -->
  <g transform="translate(1200 450)">
    <circle cx="0" cy="0" r="240" fill="url(#halo6)"/>

    <!-- Stylized bakuchiol leaf (psoralea corylifolia) -->
    <g>
      <path d="M 0 -200 Q 110 -160 130 -40 Q 110 110 0 200 Q -110 110 -130 -40 Q -110 -160 0 -200 Z"
            fill="#9F8449" fill-opacity=".35" stroke="#7A6830" stroke-width="3"/>
      <!-- Mid-vein -->
      <line x1="0" y1="-200" x2="0" y2="200" stroke="#7A6830" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Side veins -->
      <g stroke="#7A6830" stroke-width="1.5" fill="none" stroke-linecap="round">
        <path d="M 0 -150 Q 60 -140 95 -100"/>
        <path d="M 0 -150 Q -60 -140 -95 -100"/>
        <path d="M 0 -80 Q 70 -70 115 -30"/>
        <path d="M 0 -80 Q -70 -70 -115 -30"/>
        <path d="M 0 -10 Q 75 0 120 40"/>
        <path d="M 0 -10 Q -75 0 -120 40"/>
        <path d="M 0 60 Q 70 70 105 110"/>
        <path d="M 0 60 Q -70 70 -105 110"/>
        <path d="M 0 130 Q 55 140 75 170"/>
        <path d="M 0 130 Q -55 140 -75 170"/>
      </g>
    </g>
  </g>

  <!-- Labels -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="400" y="160" font-size="16" font-weight="700" fill="#2F3269" letter-spacing="3">SYNTHETIC ACTIVE</text>
    <text x="400" y="200" font-size="42" font-weight="400" font-family="DM Serif Display, Georgia, serif" fill="#2F3269">Retinol</text>

    <text x="1200" y="160" font-size="16" font-weight="700" fill="#7A6830" letter-spacing="3">PLANT-DERIVED</text>
    <text x="1200" y="200" font-size="42" font-weight="400" font-family="DM Serif Display, Georgia, serif" fill="#7A6830">Bakuchiol</text>
  </g>

  <!-- Bottom comparison metric -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#4A4F7A" letter-spacing="1.5">
    <text x="400" y="780" text-anchor="middle">VITAMIN A · 0.5%</text>
    <text x="1200" y="780" text-anchor="middle">PSORALEA CORYLIFOLIA · 1%</text>
  </g>
  <text x="800" y="855" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#2F3269" letter-spacing="3">A CLINICAL COMPARISON</text>
</svg>
