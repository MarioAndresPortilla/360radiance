<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Rosacea triggers — radial map of inflammation causes">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF8F2"/>
      <stop offset="1" stop-color="#EFEAE0"/>
    </linearGradient>
    <radialGradient id="flush3" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#9f4f63" stop-opacity=".55"/>
      <stop offset=".5" stop-color="#c47284" stop-opacity=".25"/>
      <stop offset="1" stop-color="#c47284" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hatch3" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#2F3269" stroke-opacity=".035"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg3)"/>
  <rect width="1600" height="900" fill="url(#hatch3)"/>

  <!-- Concentric trigger rings -->
  <g fill="none" stroke="#442F69" stroke-opacity=".18">
    <circle cx="800" cy="450" r="120" stroke-width="1"/>
    <circle cx="800" cy="450" r="200" stroke-width="1" stroke-dasharray="3 6"/>
    <circle cx="800" cy="450" r="290" stroke-width="1" stroke-dasharray="3 6"/>
    <circle cx="800" cy="450" r="370" stroke-width="1" stroke-dasharray="3 6"/>
  </g>

  <!-- Central rosacea flush area -->
  <circle cx="800" cy="450" r="170" fill="url(#flush3)"/>
  <circle cx="800" cy="450" r="115" fill="#9f4f63" fill-opacity=".22" stroke="#9f4f63" stroke-opacity=".5" stroke-width="1.5"/>
  <circle cx="800" cy="450" r="78" fill="#9f4f63" fill-opacity=".18"/>

  <!-- Center label -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" text-anchor="middle">
    <text x="800" y="445" font-size="14" font-weight="700" fill="#2F3269" letter-spacing="2">ROSACEA</text>
    <text x="800" y="467" font-size="11" font-weight="600" fill="#4A4F7A" letter-spacing="1.5">FLUSH ZONE</text>
  </g>

  <!-- 12 trigger nodes radiating from center -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#2F3269" text-anchor="middle">
    <!-- 12 triggers at 30-degree intervals on r=370 -->
    <g>
      <line x1="800" y1="450" x2="800" y2="80" stroke="#442F69" stroke-opacity=".25" stroke-width="1"/>
      <circle cx="800" cy="80" r="14" fill="#FFF4C1" stroke="#9F8449" stroke-width="1.5"/>
      <text x="800" y="55" letter-spacing="1">SUN · UV</text>
    </g>
    <g>
      <line x1="800" y1="450" x2="1120" y2="265" stroke="#442F69" stroke-opacity=".25" stroke-width="1"/>
      <circle cx="1120" cy="265" r="14" fill="#FFF4C1" stroke="#9F8449" stroke-width="1.5"/>
      <text x="1175" y="260" text-anchor="start" letter-spacing="1">HEAT</text>
    </g>
    <g>
      <line x1="800" y1="450" x2="1120" y2="635" stroke="#442F69" stroke-opacity=".25" stroke-width="1"/>
      <circle cx="1120" cy="635" r="14" fill="#FFF4C1" stroke="#9F8449" stroke-width="1.5"/>
      <text x="1175" y="640" text-anchor="start" letter-spacing="1">ALCOHOL</text>
    </g>
    <g>
      <line x1="800" y1="450" x2="800" y2="820" stroke="#442F69" stroke-opacity=".25" stroke-width="1"/>
      <circle cx="800" cy="820" r="14" fill="#FFF4C1" stroke="#9F8449" stroke-width="1.5"/>
      <text x="800" y="855" letter-spacing="1">SPICY FOOD</text>
    </g>
    <g>
      <line x1="800" y1="450" x2="480" y2="635" stroke="#442F69" stroke-opacity=".25" stroke-width="1"/>
      <circle cx="480" cy="635" r="14" fill="#FFF4C1" stroke="#9F8449" stroke-width="1.5"/>
      <text x="425" y="640" text-anchor="end" letter-spacing="1">STRESS</text>
    </g>
    <g>
      <line x1="800" y1="450" x2="480" y2="265" stroke="#442F69" stroke-opacity=".25" stroke-width="1"/>
      <circle cx="480" cy="265" r="14" fill="#FFF4C1" stroke="#9F8449" stroke-width="1.5"/>
      <text x="425" y="260" text-anchor="end" letter-spacing="1">EXERCISE</text>
    </g>

    <!-- Mid-ring secondary triggers -->
    <g>
      <line x1="800" y1="450" x2="945" y2="170" stroke="#442F69" stroke-opacity=".15" stroke-width="1"/>
      <circle cx="945" cy="170" r="9" fill="#E7C27E"/>
    </g>
    <g>
      <line x1="800" y1="450" x2="655" y2="170" stroke="#442F69" stroke-opacity=".15" stroke-width="1"/>
      <circle cx="655" cy="170" r="9" fill="#E7C27E"/>
    </g>
    <g>
      <line x1="800" y1="450" x2="945" y2="730" stroke="#442F69" stroke-opacity=".15" stroke-width="1"/>
      <circle cx="945" cy="730" r="9" fill="#E7C27E"/>
    </g>
    <g>
      <line x1="800" y1="450" x2="655" y2="730" stroke="#442F69" stroke-opacity=".15" stroke-width="1"/>
      <circle cx="655" cy="730" r="9" fill="#E7C27E"/>
    </g>
    <g>
      <line x1="800" y1="450" x2="1175" y2="450" stroke="#442F69" stroke-opacity=".15" stroke-width="1"/>
      <circle cx="1175" cy="450" r="9" fill="#E7C27E"/>
    </g>
    <g>
      <line x1="800" y1="450" x2="425" y2="450" stroke="#442F69" stroke-opacity=".15" stroke-width="1"/>
      <circle cx="425" cy="450" r="9" fill="#E7C27E"/>
    </g>
  </g>
</svg>
