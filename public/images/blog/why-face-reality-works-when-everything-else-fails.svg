<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Why Face Reality works — 12-week clinical acne protocol">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#21244F"/>
      <stop offset=".55" stop-color="#2F3269"/>
      <stop offset="1" stop-color="#442F69"/>
    </linearGradient>
    <radialGradient id="glow1" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#FFF4C1" stop-opacity=".55"/>
      <stop offset=".6" stop-color="#E7C27E" stop-opacity=".18"/>
      <stop offset="1" stop-color="#E7C27E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="arc1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#52357D"/>
      <stop offset=".5" stop-color="#E7C27E"/>
      <stop offset="1" stop-color="#FFF4C1"/>
    </linearGradient>
    <pattern id="dots1" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#FFF4C1" fill-opacity=".09"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg1)"/>
  <rect width="1600" height="900" fill="url(#dots1)"/>

  <!-- Soft halo behind the "clear face" node -->
  <circle cx="800" cy="380" r="320" fill="url(#glow1)"/>

  <!-- Central face circle (clearing skin) -->
  <circle cx="800" cy="380" r="170" fill="#FFF4C1" fill-opacity=".06" stroke="#FFF4C1" stroke-opacity=".4" stroke-width="1.5"/>
  <circle cx="800" cy="380" r="125" fill="#FFF4C1" fill-opacity=".1" stroke="#E7C27E" stroke-opacity=".55" stroke-width="2"/>
  <circle cx="800" cy="380" r="78" fill="#E7C27E" fill-opacity=".18"/>

  <!-- Faint "before" blemish dots (left), fading to clear (right) -->
  <g fill="#9f4f63" fill-opacity=".55">
    <circle cx="745" cy="350" r="5"/>
    <circle cx="760" cy="395" r="3.5"/>
    <circle cx="780" cy="362" r="2.5"/>
    <circle cx="765" cy="420" r="2"/>
  </g>

  <!-- Sweeping arc — the 12-week journey -->
  <path d="M 200 700 Q 800 540 1400 700" stroke="url(#arc1)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- 12 nodes along the arc -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="13" text-anchor="middle" fill="#FFF4C1">
    <g>
      <circle cx="200" cy="700" r="9" fill="#FFF4C1"/>
      <text y="730" x="200" fill="#FFF4C1" fill-opacity=".7">W1</text>
    </g>
    <g>
      <circle cx="309" cy="668" r="7" fill="#E7C27E"/>
    </g>
    <g>
      <circle cx="418" cy="641" r="7" fill="#E7C27E"/>
    </g>
    <g>
      <circle cx="527" cy="619" r="7" fill="#E7C27E"/>
      <text y="595" x="527" fill="#FFF4C1" fill-opacity=".55" font-size="11">W4</text>
    </g>
    <g>
      <circle cx="636" cy="601" r="7" fill="#E7C27E"/>
    </g>
    <g>
      <circle cx="745" cy="589" r="7" fill="#E7C27E"/>
    </g>
    <g>
      <circle cx="855" cy="589" r="7" fill="#FFF4C1"/>
      <text y="565" x="855" fill="#FFF4C1" fill-opacity=".55" font-size="11">W7</text>
    </g>
    <g>
      <circle cx="964" cy="601" r="7" fill="#FFF4C1"/>
    </g>
    <g>
      <circle cx="1073" cy="619" r="7" fill="#FFF4C1"/>
    </g>
    <g>
      <circle cx="1182" cy="641" r="7" fill="#FFF4C1"/>
      <text y="617" x="1182" fill="#FFF4C1" fill-opacity=".55" font-size="11">W10</text>
    </g>
    <g>
      <circle cx="1291" cy="668" r="7" fill="#FFF4C1"/>
    </g>
    <g>
      <circle cx="1400" cy="700" r="11" fill="#FFF4C1"/>
      <text y="730" x="1400" fill="#FFF4C1" fill-opacity=".7">W12</text>
    </g>
  </g>

  <!-- Tiny editorial caption -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" fill="#FFF4C1" fill-opacity=".55">
    <text x="800" y="800" text-anchor="middle" font-size="13" font-weight="700" letter-spacing="3">THE 12-WEEK CLINICAL PROTOCOL</text>
  </g>
</svg>
