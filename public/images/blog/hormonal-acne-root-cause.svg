<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Hormonal acne — the androgen sebum cycle">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21244F"/>
      <stop offset="1" stop-color="#442F69"/>
    </linearGradient>
    <linearGradient id="wave7" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#52357D"/>
      <stop offset=".5" stop-color="#E7C27E"/>
      <stop offset="1" stop-color="#FFF4C1"/>
    </linearGradient>
    <radialGradient id="moon7" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#FFF4C1" stop-opacity=".95"/>
      <stop offset="1" stop-color="#E7C27E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stars7" x="0" y="0" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="40" r="1" fill="#FFF4C1" fill-opacity=".4"/>
      <circle cx="80" cy="20" r=".8" fill="#FFF4C1" fill-opacity=".5"/>
      <circle cx="60" cy="90" r="1.2" fill="#FFF4C1" fill-opacity=".35"/>
      <circle cx="100" cy="70" r=".6" fill="#FFF4C1" fill-opacity=".5"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg7)"/>
  <rect width="1600" height="900" fill="url(#stars7)"/>

  <!-- Distant glow / "moon" representing the cycle -->
  <circle cx="1280" cy="220" r="180" fill="url(#moon7)"/>
  <circle cx="1280" cy="220" r="80" fill="#FFF4C1" fill-opacity=".15" stroke="#FFF4C1" stroke-opacity=".4" stroke-width="1.5"/>

  <!-- 4 moon-phase nodes (the cycle) -->
  <g>
    <circle cx="400" cy="220" r="32" fill="none" stroke="#FFF4C1" stroke-opacity=".5" stroke-width="2"/>
    <circle cx="400" cy="220" r="32" fill="#FFF4C1" fill-opacity=".15"/>

    <circle cx="700" cy="220" r="32" fill="#FFF4C1" fill-opacity=".15" stroke="#FFF4C1" stroke-opacity=".5" stroke-width="2"/>
    <path d="M 700 188 A 32 32 0 0 1 700 252 Z" fill="#FFF4C1" fill-opacity=".55"/>

    <circle cx="1000" cy="220" r="32" fill="#FFF4C1" fill-opacity=".7"/>

    <circle cx="1280" cy="220" r="32" fill="#FFF4C1" fill-opacity=".15" stroke="#FFF4C1" stroke-opacity=".5" stroke-width="2"/>
    <path d="M 1280 188 A 32 32 0 0 0 1280 252 Z" fill="#FFF4C1" fill-opacity=".55"/>
  </g>

  <!-- Sine wave: hormone curve -->
  <path d="M 100 580 Q 250 380 400 580 T 700 580 T 1000 580 T 1300 580 T 1500 580" stroke="url(#wave7)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Soft second wave underneath -->
  <path d="M 100 600 Q 250 460 400 600 T 700 600 T 1000 600 T 1300 600 T 1500 600" stroke="#52357D" stroke-width="2" stroke-opacity=".5" fill="none" stroke-linecap="round"/>

  <!-- Breakout dots clustered at peaks -->
  <g fill="#9f4f63">
    <circle cx="245" cy="395" r="7"/>
    <circle cx="265" cy="430" r="5"/>
    <circle cx="225" cy="430" r="4"/>
    <circle cx="255" cy="460" r="3"/>
    <circle cx="845" cy="395" r="7"/>
    <circle cx="865" cy="430" r="5"/>
    <circle cx="825" cy="430" r="4"/>
    <circle cx="855" cy="460" r="3"/>
    <circle cx="1145" cy="395" r="6"/>
    <circle cx="1165" cy="430" r="4"/>
    <circle cx="1125" cy="430" r="3"/>
  </g>

  <!-- Day labels along the wave -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF4C1" fill-opacity=".55" text-anchor="middle" letter-spacing="1.5">
    <text x="245" y="710">DAY 7</text>
    <text x="545" y="710">DAY 14</text>
    <text x="845" y="710">DAY 21</text>
    <text x="1145" y="710">DAY 28</text>
    <text x="1445" y="710">CYCLE</text>
  </g>

  <!-- Hormone labels at top -->
  <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF4C1" fill-opacity=".7" text-anchor="middle" letter-spacing="1.5">
    <text x="400" y="290">FOLLICULAR</text>
    <text x="700" y="290">OVULATION</text>
    <text x="1000" y="290">LUTEAL</text>
    <text x="1280" y="290">MENSES</text>
  </g>

  <text x="800" y="800" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFF4C1" letter-spacing="3" fill-opacity=".7">ANDROGEN · SEBUM · BREAKOUT</text>
</svg>
