      <stop offset="0" stop-color="#FAF8F2"/>
      <stop offset="1" stop-color="#EFEAE0"/>
    </linearGradient>
    <radialGradient id="strong5" cx=".5" cy=".5" r=".4">
      <stop offset="0" stop-color="#FFF4C1" stop-opacity=".75"/>
      <stop offset="1" stop-color="#E7C27E" stop-opacity="0"/>
