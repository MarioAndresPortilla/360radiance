<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Building a morning skincare routine — five-step sequence with sunrise gradient">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#21244F"/>
      <stop offset=".4" stop-color="#442F69"/>
      <stop offset=".7" stop-color="#9F8449"/>
      <stop offset="1" stop-color="#FFF4C1"/>
    </linearGradient>
    <radialGradient id="sun8" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#FFF4C1"/>
      <stop offset=".4" stop-color="#F3D38C"/>
      <stop offset="1" stop-color="#E7C27E" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots8" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r=".8" fill="#FFF4C1" fill-opacity=".15"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg8)"/>
  <rect width="1600" height="900" fill="url(#dots8)"/>

  <!-- Rising sun behind the steps -->
  <circle cx="800" cy="700" r="450" fill="url(#sun8)"/>
  <circle cx="800" cy="700" r="220" fill="#FFF4C1" fill-opacity=".55"/>
  <circle cx="800" cy="700" r="170" fill="#FFF4C1" fill-opacity=".75"/>

  <!-- Horizon line -->
  <line x1="0" y1="700" x2="1600" y2="700" stroke="#FFF4C1" stroke-opacity=".5" stroke-width="1.5"/>

  <!-- Five routine step circles, evenly spaced -->
  <g>
    <!-- Step 1: Cleanse -->
    <g transform="translate(280 460)">
      <circle r="68" fill="#21244F" stroke="#FFF4C1" stroke-width="2.5"/>
      <circle r="58" fill="none" stroke="#E7C27E" stroke-opacity=".45" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- Drop icon -->
      <path d="M 0 -28 Q 16 -8 16 8 Q 16 24 0 24 Q -16 24 -16 8 Q -16 -8 0 -28 Z" fill="#FFF4C1"/>
      <text y="50" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF4C1" letter-spacing="1.5">CLEANSE</text>
      <text y="-90" text-anchor="middle" font-family="DM Serif Display, Georgia, serif" font-size="22" fill="#FFF4C1">01</text>
    </g>

    <!-- Step 2: Tone -->
    <g transform="translate(540 460)">
      <circle r="68" fill="#21244F" stroke="#FFF4C1" stroke-width="2.5"/>
      <circle r="58" fill="none" stroke="#E7C27E" stroke-opacity=".45" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- Wave icon -->
      <path d="M -22 0 Q -11 -12 0 0 T 22 0" stroke="#FFF4C1" stroke-width="3" fill="none" stroke-linecap="round"/>
      <path d="M -22 12 Q -11 0 0 12 T 22 12" stroke="#FFF4C1" stroke-width="3" fill="none" stroke-linecap="round" opacity=".7"/>
      <text y="50" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF4C1" letter-spacing="1.5">TONE</text>
      <text y="-90" text-anchor="middle" font-family="DM Serif Display, Georgia, serif" font-size="22" fill="#FFF4C1">02</text>
    </g>

    <!-- Step 3: Serum -->
    <g transform="translate(800 460)">
      <circle r="78" fill="#FFF4C1" stroke="#9F8449" stroke-width="3"/>
      <circle r="68" fill="none" stroke="#9F8449" stroke-opacity=".55" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- Dropper icon -->
      <rect x="-6" y="-30" width="12" height="20" rx="2" fill="#2F3269"/>
      <path d="M -7 -10 L 7 -10 L 4 28 L -4 28 Z" fill="#2F3269"/>
      <circle cx="0" cy="32" r="5" fill="#9F8449"/>
      <text y="58" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" font-weight="700" fill="#2F3269" letter-spacing="1.5">SERUM</text>
      <text y="-100" text-anchor="middle" font-family="DM Serif Display, Georgia, serif" font-size="24" fill="#FFF4C1">03</text>
    </g>

    <!-- Step 4: Moisturize -->
    <g transform="translate(1060 460)">
      <circle r="68" fill="#21244F" stroke="#FFF4C1" stroke-width="2.5"/>
      <circle r="58" fill="none" stroke="#E7C27E" stroke-opacity=".45" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- Cream jar icon -->
      <rect x="-22" y="-12" width="44" height="32" rx="4" fill="none" stroke="#FFF4C1" stroke-width="2.5"/>
      <rect x="-26" y="-22" width="52" height="10" rx="2" fill="#FFF4C1"/>
      <text y="50" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF4C1" letter-spacing="1.5">MOISTURIZE</text>
      <text y="-90" text-anchor="middle" font-family="DM Serif Display, Georgia, serif" font-size="22" fill="#FFF4C1">04</text>
    </g>

    <!-- Step 5: SPF -->
    <g transform="translate(1320 460)">
      <circle r="68" fill="#21244F" stroke="#FFF4C1" stroke-width="2.5"/>
      <circle r="58" fill="none" stroke="#E7C27E" stroke-opacity=".45" stroke-width="1" stroke-dasharray="2 4"/>
      <!-- Sun icon -->
      <circle cx="0" cy="0" r="10" fill="#FFF4C1"/>
      <g stroke="#FFF4C1" stroke-width="2.5" stroke-linecap="round">
        <line x1="0" y1="-22" x2="0" y2="-15"/>
        <line x1="0" y1="22" x2="0" y2="15"/>
        <line x1="-22" y1="0" x2="-15" y2="0"/>
        <line x1="22" y1="0" x2="15" y2="0"/>
        <line x1="-16" y1="-16" x2="-11" y2="-11"/>
        <line x1="16" y1="-16" x2="11" y2="-11"/>
        <line x1="-16" y1="16" x2="-11" y2="11"/>
        <line x1="16" y1="16" x2="11" y2="11"/>
      </g>
      <text y="50" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11" font-weight="700" fill="#FFF4C1" letter-spacing="1.5">SPF</text>
      <text y="-90" text-anchor="middle" font-family="DM Serif Display, Georgia, serif" font-size="22" fill="#FFF4C1">05</text>
    </g>
  </g>

  <!-- Connecting hairline between steps -->
  <line x1="348" y1="460" x2="472" y2="460" stroke="#FFF4C1" stroke-opacity=".4" stroke-width="1.5" stroke-dasharray="3 5"/>
  <line x1="608" y1="460" x2="722" y2="460" stroke="#FFF4C1" stroke-opacity=".4" stroke-width="1.5" stroke-dasharray="3 5"/>
  <line x1="878" y1="460" x2="992" y2="460" stroke="#FFF4C1" stroke-opacity=".4" stroke-width="1.5" stroke-dasharray="3 5"/>
  <line x1="1128" y1="460" x2="1252" y2="460" stroke="#FFF4C1" stroke-opacity=".4" stroke-width="1.5" stroke-dasharray="3 5"/>

  <text x="800" y="120" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13" font-weight="700" fill="#FFF4C1" letter-spacing="3" fill-opacity=".7">A.M. SKIN PROTOCOL · 5 STEPS · IN ORDER</text>
</svg>
